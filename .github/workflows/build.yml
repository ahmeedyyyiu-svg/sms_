name: Build Android App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # البحث عن ملف package.json والعمل من مجلده مباشرة
        run: |
          DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          cd $DIR
          npm install
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          cd $DIR
          # التأكد من وجود مجلد android والقيام بالبناء
          if [ -d "android" ]; then
            cd android
            ./gradlew assembleRelease
          else
            echo "Android folder not found!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          # البحث عن ملف APK في أي مكان داخل المستودع
          path: '**/build/outputs/apk/release/*.apk'
