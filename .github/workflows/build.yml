name: Build Android App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - List Files
        run: ls -R
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          # سيقوم بالدخول لأي مجلد يحتوي على package.json تلقائياً
          cd $(find . -name "package.json" -exec dirname {} \; | head -n 1)
          npm install
