name: Build Flutter APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      
      # هذا الأمر سيبحث عن ملف pubspec.yaml في أي مكان داخل المستودع ويبدأ البناء منه
      - name: Install dependencies
        run: |
          find . -name "pubspec.yaml" -exec dirname {} \; | xargs -I {} sh -c 'cd {} && flutter pub get'
        
      - name: Build APK
        run: |
          # العثور على المجلد الذي يحتوي على pubspec.yaml وبناء المشروع منه
          PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          cd $PROJECT_DIR
          flutter build apk --release
        
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          # العثور على ملف الـ APK الناتج في أي مجلد فرعي
          path: '**/build/app/outputs/flutter-apk/app-release.apk'
