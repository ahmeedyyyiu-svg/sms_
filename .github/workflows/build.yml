name: Build Flutter APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      
      # هذا الأمر سيبحث عن ملف pubspec.yaml في أي مكان داخل المستودع ويبدأ البناء منه
      - name: Install dependencies
        run: |
          find . -name "pubspec.yaml" -exec dirname {} \; | xargs -I {} sh -c 'cd {} && flutter pub get'
        
      - name: Build APK
        run: |
          # Find a pubspec directory that looks like a Flutter app (has android/ and lib/main.dart)
          PROJECT_DIR=""
          for d in $(find . -name "pubspec.yaml" -exec dirname {} \;); do
            if [ -d "$d/android" ] && [ -f "$d/lib/main.dart" ]; then
              PROJECT_DIR="$d"
              break
            fi
          done

          # Fallback: use the first pubspec directory if no app directory matched
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
            echo "No project dir with android/lib/main.dart found; falling back to first pubspec dir: $PROJECT_DIR"
          else
            echo "Selected Flutter project dir: $PROJECT_DIR"
          fi

          cd "$PROJECT_DIR"
          echo "Working directory: $(pwd)"
          echo "Listing top-level files:"
          ls -la

          # If your entrypoint is not lib/main.dart, set --target explicitly:
          # flutter build apk --release --target=lib/your_entry.dart
          flutter build apk --release
        
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/flutter-apk/*.apk
